<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AimTracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .login-box h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .login-input:focus {
            outline: none;
            border-color: #11998e;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .login-link {
            color: #11998e;
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
        }

        .login-link:hover {
            color: #38ef7d;
        }

        .login-error {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .nav-link {
            display: inline-block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-link:hover {
            color: #11998e;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🎯</div>
        <h2 id="loginTitle">登录 AimTracker</h2>
        <p id="loginSubtitle">登录后开始追踪您的日常习惯</p>
        <div class="login-error" id="loginError"></div>
        <input type="text" class="login-input" id="usernameInput" placeholder="用户名" autocomplete="username">
        <input type="password" class="login-input" id="passwordInput" placeholder="密码" autocomplete="current-password">
        <button class="login-btn" id="loginBtn" onclick="handleAuth()">登 录</button>
        <p>
            <span id="loginLinkText">还没有账号？</span>
            <span class="login-link" id="toggleLoginLink" onclick="toggleMode()">立即注册</span>
        </p>
        <a href="/" class="nav-link">← 返回目标追踪器</a>
    </div>

    <script>
        let isLoginMode = true;
        const API_BASE = window.location.origin;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                document.getElementById('loginTitle').textContent = '登录 AimTracker';
                document.getElementById('loginSubtitle').textContent = '登录后开始追踪您的日常习惯';
                document.getElementById('loginBtn').textContent = '登 录';
                document.getElementById('loginLinkText').textContent = '还没有账号？';
                document.getElementById('toggleLoginLink').textContent = '立即注册';
            } else {
                document.getElementById('loginTitle').textContent = '注册 AimTracker';
                document.getElementById('loginSubtitle').textContent = '创建账号来保存您的习惯数据';
                document.getElementById('loginBtn').textContent = '注 册';
                document.getElementById('loginLinkText').textContent = '已有账号？';
                document.getElementById('toggleLoginLink').textContent = '立即登录';
            }
            document.getElementById('loginError').style.display = 'none';
        }

        async function handleAuth() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            
            if (!username || !password) {
                errorDiv.textContent = '请输入用户名和密码';
                errorDiv.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = isLoginMode ? '登录中...' : '注册中...';
            
            try {
                const endpoint = isLoginMode ? '/api/login' : '/api/register';
                const response = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (isLoginMode) {
                        localStorage.setItem('habits_token', data.token);
                        localStorage.setItem('habits_username', username);
                        window.location.href = '/habits';
                    } else {
                        isLoginMode = true;
                        toggleMode();
                        errorDiv.textContent = '注册成功！请登录';
                        errorDiv.style.display = 'block';
                    }
                } else {
                    errorDiv.textContent = data.error || '操作失败';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '网络错误，请稍后重试';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = isLoginMode ? '登 录' : '注 册';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleAuth();
            }
        });
    </script>
</body>
</html>
